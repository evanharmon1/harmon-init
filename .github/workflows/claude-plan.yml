name: Claude Plan
run-name: ${{ github.actor }} is running Claude Plan
# Requires repo secrets: CLAUDE_CODE_OAUTH_TOKEN, GH_WORKFLOW_PAT (see docs/CHECKLIST.md)
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]
jobs:
  plan:
    if: >-
      (github.event.sender.login == 'evanharmon1' ||
       github.event.sender.login == 'evanharmon1-bot') &&
      (contains(github.event.comment.body, '@claude plan') ||
       contains(github.event.review.body, '@claude plan') ||
       contains(github.event.issue.body, '@claude plan') ||
       (github.event.action == 'labeled' &&
        github.event.label.name == 'claude-plan'))
    runs-on: [ "ubuntu-latest" ]
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1.0.140
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_WORKFLOW_PAT }}
          trigger_phrase: "@claude plan"
          label_trigger: "claude-plan"
          track_progress: true
          base_branch: main
          branch_prefix: claude/
          claude_args: "--model opus --disallowedTools Edit Write Bash --max-turns 80"
          prompt: |
            Post the plan as a comment. Do not write code or modify files.
            Focus on the specific task described in the triggering comment or
            issue. Cite relevant files and existing patterns in the repo.
