name: Claude Review
run-name: ${{ github.actor }} is running Claude Review
# Requires repo secrets: CLAUDE_CODE_OAUTH_TOKEN, GH_WORKFLOW_PAT (see docs/CHECKLIST.md)
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled]
jobs:
  review:
    if: >-
      (github.event.issue.pull_request != null ||
       github.event_name == 'pull_request_review_comment' ||
       github.event_name == 'pull_request_review' ||
       github.event_name == 'pull_request') &&
      (contains(github.event.comment.body, '@claude review') ||
       contains(github.event.review.body, '@claude review') ||
       (github.event.action == 'labeled' &&
        github.event.label.name == 'claude-review'))
    runs-on: [ "ubuntu-latest" ]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Verify sender is authorized
        env:
          GH_TOKEN: ${{ secrets.GH_WORKFLOW_PAT }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          if [ "$SENDER" = "evanharmon1-bot" ] || \
             [ "$SENDER" = "renovate[bot]" ] || \
             [ "$SENDER" = "coderabbitai[bot]" ] || \
             [ "$SENDER" = "dependabot[bot]" ]; then
            echo "Bot $SENDER allowed"
            exit 0
          fi
          if [ "$SENDER" = "evanharmon1" ]; then
            echo "$SENDER is the repo owner"
          else
            echo "::error::$SENDER is not authorized"
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1.0.140
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_WORKFLOW_PAT }}
          trigger_phrase: "@claude review"
          label_trigger: "claude-review"
          track_progress: true
          use_sticky_comment: true
          allowed_bots: "renovate[bot],coderabbitai[bot],dependabot[bot]"
          base_branch: main
          branch_prefix: claude/
          claude_args: "--model sonnet --disallowedTools Edit Write Bash --max-turns 40"
          prompt: |
            Review the PR diff and post a code review comment. Flag security,
            correctness, and convention concerns (see AGENTS.md). Do not write
            code or modify files.
