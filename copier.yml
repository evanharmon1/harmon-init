# copier.yml for the harmon-init Copier project template
# Generate a new project: `copier copy harmon-init new-project --trust`
# Apply/update an existing project: `copier update --trust` (inside the project)
#
# NOTE: custom jinja delimiters are set via _envops below — template variables
# use [[ var ]] and blocks use [% if x %]. This lets GitHub Actions `${{ }}`,
# go-task `{{.VAR}}`, and lefthook `{staged_files}` appear verbatim in template
# files with zero escaping.

# ── Asked questions ─────────────────────────────────────────────────

project_name:
  type: str
  help: "NAME: Formal name of the project (Project Name)"
  placeholder: "Formal Project Name"

project_slug:
  type: str
  help: "SLUG: Project slug (project-slug)"
  default: "[[ project_name.lower().replace(' ', '-') ]]"

project_description:
  type: str
  help: "DESCRIPTION: Short description of the project"
  default: "TODO: project_description"

# Hidden author identity (defaults rarely change) — defined early so asked
# questions below can reference them in their own defaults.
author_first_name:
  type: str
  default: Evan
  when: false

author_last_name:
  type: str
  default: Harmon
  when: false

author_full_name:
  type: str
  default: "[[ author_first_name + ' ' + author_last_name ]]"
  when: false

author_email:
  type: str
  default: "evan@evanharmon.com"
  when: false

author_url:
  type: str
  default: "https://evanharmon.com"
  when: false

author_git_provider_username:
  type: str
  default: evanharmon1
  when: false

github_org:
  type: str
  help: "GITHUB ORG: GitHub org/user that will own the repo (drives repo URL, GHCR images, workflows)"
  default: "[[ author_git_provider_username ]]"

project_type:
  type: str
  help: "TYPE: What kind of project is this? (drives Taskfile, CI jobs, devcontainer tooling)"
  choices:
    general: general
    web-astro (marketing/static sites): web-astro
    web-app (TanStack/React apps): web-app
    iac (Terraform/Ansible): iac
    docs (documentation/Obsidian): docs
  default: general

include_terraform:
  type: bool
  help: "TERRAFORM: Include a terraform/ skeleton + terraform linting?"
  default: "[[ project_type == 'iac' ]]"

include_ansible:
  type: bool
  help: "ANSIBLE: Include an ansible/ skeleton + ansible linting?"
  default: "[[ project_type == 'iac' ]]"

ci_runner:
  type: str
  help: "CI RUNNER: GitHub Actions runner for this repo's workflows"
  choices:
    - ubuntu-latest
    - self-hosted
  default: ubuntu-latest

license:
  type: str
  help: "LICENSE: Add license?"
  choices:
    - mit
    - private
  default: mit

devcontainer:
  type: bool
  help: "DEVCONTAINER: Add dual-profile .devcontainer (AI bot + human dev)?"
  default: yes

git_init:
  type: bool
  help: "GIT INIT: Initialize git repo?"
  default: yes

github_remote_create:
  type: bool
  help: "GITHUB REMOTE: Create the remote repo on GitHub (gh repo create, private, pushes initial state)?"
  default: no

github_release_init:
  type: bool
  help: "RELEASE: Create an initial release (task release:init)?"
  default: no

bunch_add:
  type: bool
  help: "BUNCH: Add Bunch file to project (macOS-only, moves file to iCloud)?"
  default: no

obsidian_project_add:
  type: bool
  help: "OBSIDIAN: Add Obsidian project note to the vault (macOS-only)?"
  default: no

run_task_install:
  type: bool
  help: "TASK INSTALL: Run 'task install' after generation (brew bundle + git hooks)?"
  default: no

# ── Hidden defaults (when: false) ───────────────────────────────────

organization:
  type: str
  default: "Harmon Lab"
  when: false

organization_url:
  type: str
  default: "https://harmonlab.net"
  when: false

organization_email:
  type: str
  default: "evan@evanharmon.com"
  when: false

repo_url:
  type: str
  default: "https://github.com/[[ github_org ]]/[[ project_slug ]]"
  when: false

# Rendered inside `runs-on: [...]` in generated workflows — one place to
# extend self-hosted labels.
ci_runner_labels:
  type: str
  default: "[% if ci_runner == 'self-hosted' %]\"self-hosted\", \"linux\"[% else %]\"ubuntu-latest\"[% endif %]"
  when: false

use_node:
  type: bool
  default: "[[ project_type in ['web-astro', 'web-app'] ]]"
  when: false

use_python:
  type: bool
  default: "[[ include_ansible or project_type == 'iac' ]]"
  when: false

devcontainer_image:
  type: str
  default: "ghcr.io/[[ github_org ]]/[[ project_slug ]]-devcontainer"
  when: false

# Paths
projects_directory:
  type: str
  default: ~/git
  when: false

bunches_directory:
  type: str
  default: "/Users/evan/Library/Mobile Documents/com~apple~CloudDocs/Bunches"
  when: false

obsidian_directory:
  type: str
  default: "/Users/evan/Local/Memex"
  when: false

# Demographics
country:
  type: str
  default: United States
  when: false

state:
  type: str
  default: Kansas
  when: false

# Date & Time
current_date:
  type: str
  default: "[[ '%Y-%m-%d' | strftime ]]"
  when: false

current_year:
  type: str
  default: "[[ '%Y' | strftime ]]"
  when: false

# ── Post-generation tasks ───────────────────────────────────────────
# All side-effectful tasks default to no so `copier copy --defaults` is
# CI-safe (except git_init, which only touches the new project directory).

_tasks:
  - command: git init -b main
    when: "[[ git_init ]]"
  - command: gh repo create [[ github_org ]]/[[ project_slug ]] --private --source=. --push
    when: "[[ github_remote_create ]]"
  - command: task install
    when: "[[ run_task_install ]]"
  - command: task release:init
    when: "[[ github_release_init ]]"
  - command: task util:bunch-add
    when: "[[ bunch_add ]]"
  - command: task util:obsidian-add
    when: "[[ obsidian_project_add ]]"

# ── Copier settings ─────────────────────────────────────────────────

_min_copier_version: "9.4.0"

_subdirectory: template

# Keep CLAUDE.md/GEMINI.md as symlinks to AGENTS.md in generated projects
# (without this, copier dereferences symlinks into duplicate files).
_preserve_symlinks: true

# Custom jinja delimiters — see header comment. trim/lstrip keep block tags
# on their own lines from leaving blank lines in rendered output.
_envops:
  block_start_string: "[%"
  block_end_string: "%]"
  variable_start_string: "[["
  variable_end_string: "]]"
  comment_start_string: "[#"
  comment_end_string: "#]"
  trim_blocks: true
  lstrip_blocks: true

# Variables containing password/key are excluded from .copier-answers.yml
_secret_questions:
  - password
  - key
